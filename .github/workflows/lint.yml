name: Lint catalog

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly URL liveness sweep (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet jsonschema

      - name: Run linter
        run: python3 .github/scripts/lint.py
